<!DOCTYPE html>
<html>
<head>
  <title>Wedding Gallery | Alexander & Jordanne</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff;
      color: #111;
    }

    header {
      text-align: center;
      padding: 40px 20px 20px;
    }

    h1 {
      font-weight: 300;
      font-size: 48px;
      margin: 0;
    }

    .grid {
      column-count: 3;
      column-gap: 12px;
      padding: 20px;
    }

    @media (max-width: 900px) {
      .grid { column-count: 2; }
    }

    @media (max-width: 500px) {
      .grid { column-count: 1; }
    }

    .item {
      break-inside: avoid;
      margin-bottom: 12px;
      border-radius: 8px;
      overflow: hidden;
    }

    img {
      width: 100%;
      display: block;
      cursor: pointer;
      transition: 0.2s;
    }

    img:hover {
      opacity: 0.9;
    }

    /* LIGHTBOX */
    .lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 999;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 80%;
      object-fit: contain;
    }

    .controls {
      position: absolute;
      width: 100%;
      display: flex;
      justify-content: space-between;
      top: 50%;
      transform: translateY(-50%);
      padding: 0 20px;
      box-sizing: border-box;
      color: white;
      font-size: 40px;
      user-select: none;
    }

    .close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 30px;
      color: white;
      cursor: pointer;
    }

    .nav {
      cursor: pointer;
      padding: 10px;
    }
  </style>
</head>

<body>

<header>
  <h1>Gallery</h1>
  <p>Alexander & Jordanne • 08.08.26</p>
</header>

<div id="gallery" class="grid">
  <div>Loading memories...</div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <div class="close" onclick="closeLightbox()">✕</div>

  <div class="controls">
    <div class="nav" onclick="prevImage()">‹</div>
    <div class="nav" onclick="nextImage()">›</div>
  </div>

  <img id="lightboxImg" />
</div>

<script>
  const supabaseUrl = "https://abggbnqgbbwtswdecgtz.supabase.co";
  const supabaseKey = "sb_publishable_RHFh1DWp1TbpqmbGYx6x3Q_4uNH7cHh";

  const client = supabase.createClient(supabaseUrl, supabaseKey);

  let images = [];
  let currentIndex = 0;

  function openLightbox(index) {
    currentIndex = index;
    document.getElementById("lightbox").style.display = "flex";
    document.getElementById("lightboxImg").src = images[index];
  }

  function closeLightbox() {
    document.getElementById("lightbox").style.display = "none";
  }

  function nextImage() {
    currentIndex = (currentIndex + 1) % images.length;
    document.getElementById("lightboxImg").src = images[currentIndex];
  }

  function prevImage() {
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    document.getElementById("lightboxImg").src = images[currentIndex];
  }

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeLightbox();
    if (e.key === "ArrowRight") nextImage();
    if (e.key === "ArrowLeft") prevImage();
  });

  async function loadGallery() {
    const container = document.getElementById("gallery");

    const { data, error } = await client
      .storage
      .from("wedding-media")
      .list("wedding", {
        limit: 100,
        sortBy: { column: "created_at", order: "desc" }
      });

    if (error) {
      container.innerHTML = "Failed to load gallery.";
      return;
    }

    container.innerHTML = "";
    images = [];

    data.forEach((file, index) => {
      const { data: urlData } = client
        .storage
        .from("wedding-media")
        .getPublicUrl("wedding/" + file.name);

      const url = urlData.publicUrl;
      images.push(url);

      const div = document.createElement("div");
      div.className = "item";

      const img = document.createElement("img");
      img.src = url;
      img.onclick = () => openLightbox(index);

      div.appendChild(img);
      container.appendChild(div);
    });
  }

  loadGallery();
  setInterval(loadGallery, 10000);
</script>

</body>
</html>
