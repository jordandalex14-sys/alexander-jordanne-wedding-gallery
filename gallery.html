<!DOCTYPE html>
<html>
<head>
  <title>Wedding Gallery | Alexander & Jordanne</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: white;
    }

    header {
      text-align: center;
      padding: 18px;
      font-size: 13px;
      letter-spacing: 2px;
      opacity: 0.8;
    }

    /* 🏠 GRID VIEW */
    .grid {
      column-count: 3;
      column-gap: 12px;
      padding: 12px;
    }

    @media (max-width: 800px) {
      .grid { column-count: 2; }
    }

    @media (max-width: 500px) {
      .grid { column-count: 2; }
    }

    .item {
      margin-bottom: 12px;
      border-radius: 12px;
      overflow: hidden;
      break-inside: avoid;
    }

    .item img {
      width: 100%;
      display: block;
      cursor: pointer;
    }

    /* 📱 FULLSCREEN VIEWER */
    .viewer {
      position: fixed;
      inset: 0;
      display: none;
      z-index: 100;
      background: black;
      overflow: hidden;
    }

    /* 🌫️ blurred background */
    .bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      filter: blur(30px);
      transform: scale(1.2);
      opacity: 0.6;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.35);
    }

    /* 🖼️ swipe container */
    .swipe {
      position: relative;
      z-index: 2;
      height: 100%;
      width: 100%;
      display: flex;
      overflow-x: scroll;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }

    .swipe::-webkit-scrollbar {
      display: none;
    }

    .slide {
      min-width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      scroll-snap-align: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .slide img {
      max-width: 95%;
      max-height: 85%;
      object-fit: contain;
      border-radius: 14px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    /* controls */
    .close {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 26px;
      cursor: pointer;
      z-index: 10;
    }
  </style>
</head>

<body>

<header>
  Wedding Gallery • Alexander & Jordanne
</header>

<div class="grid" id="grid"></div>

<!-- 📱 FULLSCREEN VIEW -->
<div class="viewer" id="viewer">

  <div class="bg" id="bg"></div>
  <div class="overlay"></div>

  <div class="close" onclick="closeViewer()">✕</div>

  <!-- 👆 SWIPE AREA -->
  <div class="swipe" id="swipe"></div>

</div>

<script>
  const supabaseUrl = "https://abggbnqgbbwtswdecgtz.supabase.co";
  const supabaseKey = "sb_publishable_RHFh1DWp1TbpqmbGYx6x3Q_4uNH7cHh";

  const client = supabase.createClient(supabaseUrl, supabaseKey);

  let images = [];

  async function loadGallery() {
    const grid = document.getElementById("grid");

    const { data } = await client
      .storage
      .from("wedding-media")
      .list("wedding", {
        limit: 100,
        sortBy: { column: "created_at", order: "desc" }
      });

    grid.innerHTML = "";
    images = [];

    data.forEach((file, i) => {

      const { data: urlData } = client
        .storage
        .from("wedding-media")
        .getPublicUrl("wedding/" + file.name);

      const url = urlData.publicUrl;
      images.push(url);

      const div = document.createElement("div");
      div.className = "item";

      const img = document.createElement("img");
      img.src = url;
      img.onclick = () => openViewer(i);

      div.appendChild(img);
      grid.appendChild(div);
    });
  }

  function openViewer(startIndex) {
    const viewer = document.getElementById("viewer");
    const swipe = document.getElementById("swipe");

    swipe.innerHTML = "";

    images.forEach(url => {
      const slide = document.createElement("div");
      slide.className = "slide";

      const img = document.createElement("img");
      img.src = url;

      slide.appendChild(img);
      swipe.appendChild(slide);
    });

    viewer.style.display = "block";

    updateBackground();

    setTimeout(() => {
      swipe.scrollTo({
        left: startIndex * window.innerWidth,
        behavior: "instant"
      });
    }, 50);

    swipe.onscroll = () => updateBackground();
  }

  function updateBackground() {
    const swipe = document.getElementById("swipe");
    const bg = document.getElementById("bg");

    const index = Math.round(swipe.scrollLeft / window.innerWidth);
    if (images[index]) {
      bg.style.backgroundImage = `url('${images[index]}')`;
    }
  }

  function closeViewer() {
    document.getElementById("viewer").style.display = "none";
  }

  loadGallery();
</script>

</body>
</html>
