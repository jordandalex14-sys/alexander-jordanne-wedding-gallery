<!DOCTYPE html>
<html>
<head>
  <title>Wedding Gallery | Alexander & Jordanne</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at center, #111 0%, #000 70%);
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    header {
      position: fixed;
      top: 14px;
      width: 100%;
      text-align: center;
      color: rgba(255,255,255,0.75);
      font-size: 13px;
      z-index: 10;
      letter-spacing: 2px;
    }

    /* 📱 swipe container */
    .viewer {
      height: 100vh;
      width: 100%;
      display: flex;
      overflow-x: scroll;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }

    .viewer::-webkit-scrollbar {
      display: none;
    }

    /* 🎬 premium slide */
    .slide {
      min-width: 100vw;
      height: 100vh;
      scroll-snap-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      padding: 40px;
      box-sizing: border-box;
    }

    /* 🖼️ cinematic image style */
    .slide img {
      max-width: 92%;
      max-height: 82%;
      object-fit: contain;

      border-radius: 18px;

      box-shadow:
        0 20px 60px rgba(0,0,0,0.7),
        0 2px 10px rgba(255,255,255,0.05);

      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    .slide img:active {
      transform: scale(0.98);
    }

    /* 🌫️ vignette overlay */
    .fade {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(
        circle,
        rgba(0,0,0,0) 55%,
        rgba(0,0,0,0.85) 100%
      );
    }

    /* loading */
    .loading {
      color: rgba(255,255,255,0.6);
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 14px;
      letter-spacing: 2px;
    }
  </style>
</head>

<body>

<header>
  Swipe through memories • Alexander & Jordanne
</header>

<div class="viewer" id="viewer">
  <div class="loading">Loading photos...</div>
</div>

<div class="fade"></div>

<script>
  const supabaseUrl = "https://abggbnqgbbwtswdecgtz.supabase.co";
  const supabaseKey = "sb_publishable_RHFh1DWp1TbpqmbGYx6x3Q_4uNH7cHh";

  const client = supabase.createClient(supabaseUrl, supabaseKey);

  async function loadGallery() {
    const viewer = document.getElementById("viewer");

    const { data } = await client
      .storage
      .from("wedding-media")
      .list("wedding", {
        limit: 100,
        sortBy: { column: "created_at", order: "desc" }
      });

    viewer.innerHTML = "";

    if (!data || data.length === 0) {
      viewer.innerHTML = '<div class="loading">No photos yet</div>';
      return;
    }

    data.forEach(file => {

      const { data: urlData } = client
        .storage
        .from("wedding-media")
        .getPublicUrl("wedding/" + file.name);

      const slide = document.createElement("div");
      slide.className = "slide";

      const img = document.createElement("img");
      img.src = urlData.publicUrl;

      slide.appendChild(img);
      viewer.appendChild(slide);
    });
  }

  loadGallery();
</script>

</body>
</html>
