<!DOCTYPE html>
<html>
<head>
  <title>Wedding Gallery | Alexander & Jordanne</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: white;
    }

    header {
      text-align: center;
      padding: 18px;
      font-size: 13px;
      letter-spacing: 2px;
      opacity: 0.8;
    }

    /* 🏠 GRID */
    .grid {
      column-count: 3;
      column-gap: 12px;
      padding: 12px;
    }

    @media (max-width: 800px) {
      .grid { column-count: 2; }
    }

    @media (max-width: 500px) {
      .grid { column-count: 2; }
    }

    .item {
      margin-bottom: 12px;
      border-radius: 12px;
      overflow: hidden;
      break-inside: avoid;
    }

    .item img {
      width: 100%;
      display: block;
      cursor: pointer;
    }

    /* 📱 FULL SCREEN VIEW */
    .viewer {
      position: fixed;
      inset: 0;
      display: none;
      z-index: 100;
      overflow: hidden;
      background: black;
    }

    /* 🌫️ BLURRED BACKGROUND */
    .bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      filter: blur(30px);
      transform: scale(1.2);
      opacity: 0.6;
    }

    /* dark overlay */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.35);
    }

    /* main image */
    .main {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .main img {
      max-width: 95%;
      max-height: 85%;
      object-fit: contain;
      border-radius: 14px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    /* controls */
    .close {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 26px;
      cursor: pointer;
      z-index: 10;
    }

    .nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 40px;
      cursor: pointer;
      z-index: 10;
      padding: 20px;
      user-select: none;
    }

    .left { left: 0; }
    .right { right: 0; }

    /* slideshow button */
    .slideshow-btn {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 14px;
      border: 1px solid white;
      background: rgba(255,255,255,0.1);
      cursor: pointer;
      font-size: 12px;
      z-index: 10;
    }
  </style>
</head>

<body>

<header>
  Wedding Gallery • Alexander & Jordanne
</header>

<div class="grid" id="grid"></div>

<!-- 📱 FULLSCREEN VIEWER -->
<div class="viewer" id="viewer">

  <div class="bg" id="bg"></div>
  <div class="overlay"></div>

  <div class="close" onclick="closeViewer()">✕</div>

  <div class="nav left" onclick="prev()">‹</div>
  <div class="nav right" onclick="next()">›</div>

  <div class="main">
    <img id="mainImg" />
  </div>

  <div class="slideshow-btn" onclick="toggleSlideshow()">
    🎬 Slideshow
  </div>

</div>

<script>
  const supabaseUrl = "https://abggbnqgbbwtswdecgtz.supabase.co";
  const supabaseKey = "sb_publishable_RHFh1DWp1TbpqmbGYx6x3Q_4uNH7cHh";

  const client = supabase.createClient(supabaseUrl, supabaseKey);

  let images = [];
  let index = 0;
  let slideshow = null;

  async function loadGallery() {
    const grid = document.getElementById("grid");

    const { data } = await client
      .storage
      .from("wedding-media")
      .list("wedding", {
        limit: 100,
        sortBy: { column: "created_at", order: "desc" }
      });

    grid.innerHTML = "";
    images = [];

    data.forEach((file, i) => {

      const { data: urlData } = client
        .storage
        .from("wedding-media")
        .getPublicUrl("wedding/" + file.name);

      const url = urlData.publicUrl;
      images.push(url);

      const div = document.createElement("div");
      div.className = "item";

      const img = document.createElement("img");
      img.src = url;
      img.onclick = () => openViewer(i);

      div.appendChild(img);
      grid.appendChild(div);
    });
  }

  function openViewer(i) {
    index = i;
    document.getElementById("viewer").style.display = "block";
    update();
  }

  function closeViewer() {
    document.getElementById("viewer").style.display = "none";
    stopSlideshow();
  }

  function update() {
    const img = images[index];

    document.getElementById("mainImg").src = img;
    document.getElementById("bg").style.backgroundImage = `url('${img}')`;
  }

  function next() {
    index = (index + 1) % images.length;
    update();
  }

  function prev() {
    index = (index - 1 + images.length) % images.length;
    update();
  }

  /* 🎬 SLIDESHOW */
  function toggleSlideshow() {
    if (slideshow) {
      stopSlideshow();
      return;
    }

    slideshow = setInterval(() => {
      next();
    }, 3000);
  }

  function stopSlideshow() {
    clearInterval(slideshow);
    slideshow = null;
  }

  loadGallery();
</script>

</body>
</html>
