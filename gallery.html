<!DOCTYPE html>
<html>
<head>
  <title>Wedding Gallery | Alexander & Jordanne</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: white;
      animation: pageFade 0.6s ease forwards;
    }

    @keyframes pageFade {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .toolbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;

      z-index: 9999;

      display: flex;
      justify-content: center;
      gap: 8px;

      padding: 12px 8px;

      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.15);
    }

    .toolbar a {
      color: white;
      text-decoration: none;
      font-size: 15px;
      letter-spacing: 0.5px;

      padding: 10px 14px;
      border-radius: 999px;

      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.18);

      transition: 0.3s;
    }

    .toolbar a:hover {
      background: white;
      color: black;
    }

    header {
      text-align: center;
      padding: 85px 18px 20px;
      font-size: 13px;
      letter-spacing: 2px;
      opacity: 0.8;
    }

    .hint {
      text-align: center;
      font-size: 12px;
      opacity: 0.55;
      padding-bottom: 15px;
    }

    .grid {
      column-count: 3;
      column-gap: 12px;
      padding: 12px;
    }

    @media (max-width: 800px) {
      .grid {
        column-count: 2;
      }
    }

    .item {
      margin-bottom: 12px;
      border-radius: 12px;
      overflow: hidden;
      break-inside: avoid;
      background: rgba(255,255,255,0.08);
    }

    .item img {
      width: 100%;
      display: block;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .item img:active {
      transform: scale(0.98);
      opacity: 0.9;
    }

    .viewer {
      position: fixed;
      inset: 0;
      display: none;
      z-index: 10000;
      background: black;
      overflow: hidden;
    }

    .bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      filter: blur(30px);
      transform: scale(1.2);
      opacity: 0.6;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.35);
    }

    .swipe {
      position: relative;
      z-index: 2;
      height: 100%;
      width: 100%;

      display: flex;

      overflow-x: scroll;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }

    .swipe::-webkit-scrollbar {
      display: none;
    }

    .slide {
      min-width: 100vw;
      height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      scroll-snap-align: center;

      padding: 20px;
    }

    .slide img {
      max-width: 95%;
      max-height: 85%;

      object-fit: contain;

      border-radius: 14px;

      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    .close {
      position: absolute;
      top: 18px;
      right: 24px;

      font-size: 28px;

      cursor: pointer;

      z-index: 10;

      color: white;

      background: rgba(0,0,0,0.35);
      width: 42px;
      height: 42px;

      display: flex;
      justify-content: center;
      align-items: center;

      border-radius: 999px;
      backdrop-filter: blur(10px);
    }

    .empty {
      text-align: center;
      opacity: 0.7;
      padding-top: 40px;
    }

    @media(max-width:600px) {
      .toolbar {
        gap: 6px;
        padding: 10px 6px;
      }

      .toolbar a {
        font-size: 14px;
        padding: 10px 12px;
      }

      header {
        padding-top: 78px;
        font-size: 13px;
      }

      .hint {
        font-size: 13px;
      }

      .grid {
        column-count: 2;
        column-gap: 8px;
        padding: 8px;
      }

      .item {
        margin-bottom: 8px;
        border-radius: 10px;
      }

      .slide {
        padding: 10px;
      }

      .slide img {
        max-width: 96%;
        max-height: 82%;
        border-radius: 12px;
      }

      .close {
        top: 14px;
        right: 14px;
      }
    }
  </style>
</head>

<body>

<nav class="toolbar">
  <a href="index.html">Home</a>
  <a href="upload.html">Upload</a>
  <a href="gallery.html">Gallery</a>
</nav>

<header>
  Wedding Gallery • Alexander & Jordanne
</header>

<div class="hint">
  Tap a photo to view full screen
</div>

<div class="grid" id="grid"></div>

<div class="viewer" id="viewer">
  <div class="bg" id="bg"></div>
  <div class="overlay"></div>
  <div class="close" onclick="closeViewer()">✕</div>
  <div class="swipe" id="swipe"></div>
</div>

<script>
  const supabaseUrl = "https://abggbnqgbbwtswdecgtz.supabase.co";
  const supabaseKey = "sb_publishable_RHFh1DWp1TbpqmbGYx6x3Q_4uNH7cHh";
  const client = supabase.createClient(supabaseUrl, supabaseKey);

  let images = [];

  async function loadGallery() {
    const grid = document.getElementById("grid");

    const { data, error } = await client
      .storage
      .from("wedding-media")
      .list("wedding", {
        limit: 100,
        sortBy: { column: "created_at", order: "desc" }
      });

    if (error) {
      grid.innerHTML = '<div class="empty">Gallery failed to load.</div>';
      return;
    }

    grid.innerHTML = "";
    images = [];

    if (!data || data.length === 0) {
      grid.innerHTML = '<div class="empty">No photos yet.</div>';
      return;
    }

    data.forEach((file, i) => {
      const { data: urlData } = client
        .storage
        .from("wedding-media")
        .getPublicUrl("wedding/" + file.name);

      const url = urlData.publicUrl;
      images.push(url);

      const div = document.createElement("div");
      div.className = "item";

      const img = document.createElement("img");
      img.src = url;
      img.onclick = () => openViewer(i);

      div.appendChild(img);
      grid.appendChild(div);
    });
  }

  function openViewer(startIndex) {
    const viewer = document.getElementById("viewer");
    const swipe = document.getElementById("swipe");

    swipe.innerHTML = "";

    images.forEach(url => {
      const slide = document.createElement("div");
      slide.className = "slide";

      const img = document.createElement("img");
      img.src = url;

      slide.appendChild(img);
      swipe.appendChild(slide);
    });

    viewer.style.display = "block";

    setTimeout(() => {
      swipe.scrollTo({
        left: startIndex * window.innerWidth,
        behavior: "instant"
      });

      updateBackground();
    }, 50);

    swipe.onscroll = updateBackground;
  }

  function updateBackground() {
    const swipe = document.getElementById("swipe");
    const bg = document.getElementById("bg");

    const currentIndex = Math.round(swipe.scrollLeft / window.innerWidth);

    if (images[currentIndex]) {
      bg.style.backgroundImage = "url('" + images[currentIndex] + "')";
    }
  }

  function closeViewer() {
    document.getElementById("viewer").style.display = "none";
  }

  loadGallery();
</script>

</body>
</html>
