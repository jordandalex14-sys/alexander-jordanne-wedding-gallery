<!DOCTYPE html>
<html>
<head>
  <title>Wedding Gallery | Alexander & Jordanne</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: white;
    }

    header {
      text-align: center;
      padding: 20px;
      font-size: 13px;
      letter-spacing: 2px;
      opacity: 0.8;
    }

    /* 🏠 HOME GRID */
    .grid {
      column-count: 3;
      column-gap: 12px;
      padding: 12px;
    }

    @media (max-width: 900px) {
      .grid { column-count: 2; }
    }

    @media (max-width: 500px) {
      .grid { column-count: 2; }
    }

    .item {
      margin-bottom: 12px;
      break-inside: avoid;
      border-radius: 12px;
      overflow: hidden;
    }

    .item img {
      width: 100%;
      display: block;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .item img:active {
      transform: scale(0.98);
    }

    /* 📱 SWIPE VIEW (hidden until opened) */
    .viewer {
      position: fixed;
      inset: 0;
      background: black;
      display: none;
      overflow-x: scroll;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      z-index: 100;
    }

    .viewer::-webkit-scrollbar {
      display: none;
    }

    .slide {
      min-width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      scroll-snap-align: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .slide img {
      max-width: 95%;
      max-height: 85%;
      object-fit: contain;
      border-radius: 14px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
    }

    /* close button */
    .close {
      position: fixed;
      top: 15px;
      right: 20px;
      font-size: 26px;
      z-index: 200;
      cursor: pointer;
      color: white;
    }

    .hint {
      text-align: center;
      font-size: 12px;
      opacity: 0.6;
      padding-bottom: 10px;
    }
  </style>
</head>

<body>

<header>
  Alexander & Jordanne • Wedding Gallery
</header>

<div class="hint">
  Tap a photo to view full screen
</div>

<!-- 🏠 GRID VIEW -->
<div class="grid" id="grid"></div>

<!-- 📱 SWIPE VIEW -->
<div class="viewer" id="viewer">
  <div class="close" onclick="closeViewer()">✕</div>
</div>

<script>
  const supabaseUrl = "https://abggbnqgbbwtswdecgtz.supabase.co";
  const supabaseKey = "sb_publishable_RHFh1DWp1TbpqmbGYx6x3Q_4uNH7cHh";

  const client = supabase.createClient(supabaseUrl, supabaseKey);

  let images = [];

  async function loadGallery() {
    const grid = document.getElementById("grid");

    const { data } = await client
      .storage
      .from("wedding-media")
      .list("wedding", {
        limit: 100,
        sortBy: { column: "created_at", order: "desc" }
      });

    grid.innerHTML = "";
    images = [];

    data.forEach((file, index) => {

      const { data: urlData } = client
        .storage
        .from("wedding-media")
        .getPublicUrl("wedding/" + file.name);

      const url = urlData.publicUrl;
      images.push(url);

      const div = document.createElement("div");
      div.className = "item";

      const img = document.createElement("img");
      img.src = url;

      img.onclick = () => openViewer(index);

      div.appendChild(img);
      grid.appendChild(div);
    });
  }

  function openViewer(startIndex) {
    const viewer = document.getElementById("viewer");
    viewer.innerHTML = '<div class="close" onclick="closeViewer()">✕</div>';

    images.forEach(url => {
      const slide = document.createElement("div");
      slide.className = "slide";

      const img = document.createElement("img");
      img.src = url;

      slide.appendChild(img);
      viewer.appendChild(slide);
    });

    viewer.style.display = "flex";

    // jump to selected image
    setTimeout(() => {
      viewer.scrollTo({
        left: startIndex * window.innerWidth,
        behavior: "instant"
      });
    }, 50);
  }

  function closeViewer() {
    document.getElementById("viewer").style.display = "none";
  }

  loadGallery();
</script>

</body>
</html>
