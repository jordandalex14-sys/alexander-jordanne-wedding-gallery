<!DOCTYPE html>
<html>
<head>
  <title>Wedding Gallery | Alexander & Jordanne</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff;
      color: #111;
    }

    header {
      text-align: center;
      padding: 40px 20px 20px;
    }

    h1 {
      font-weight: 300;
      font-size: 48px;
      margin: 0;
    }

    .grid {
      column-count: 3;
      column-gap: 12px;
      padding: 20px;
    }

    @media (max-width: 900px) {
      .grid { column-count: 2; }
    }

    @media (max-width: 500px) {
      .grid { column-count: 1; }
    }

    .item {
      break-inside: avoid;
      margin-bottom: 12px;
      border-radius: 8px;
      overflow: hidden;
      background: #f5f5f5;
    }

    img {
      width: 100%;
      display: block;
      cursor: pointer;
      transition: 0.2s;
    }

    img.selected {
      outline: 4px solid black;
      transform: scale(0.98);
      opacity: 0.85;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }
  </style>
</head>

<body>

<header>
  <h1>Gallery</h1>
  <p>Alexander & Jordanne • 08.08.26 • Tap to select photos 📸</p>
</header>

<div id="gallery" class="grid">
  <div class="loading">Loading memories...</div>
</div>

<script>
  const supabaseUrl = "https://abggbnqgbbwtswdecgtz.supabase.co";
  const supabaseKey = "sb_publishable_RHFh1DWp1TbpqmbGYx6x3Q_4uNH7cHh";

  const client = supabase.createClient(supabaseUrl, supabaseKey);

  function toggleSelect(img) {
    img.classList.toggle("selected");
  }

  async function loadGallery() {
    const container = document.getElementById("gallery");

    const { data, error } = await client
      .storage
      .from("wedding-media")
      .list("wedding", {
        limit: 100,
        sortBy: { column: "created_at", order: "desc" }
      });

    if (error) {
      container.innerHTML = "Failed to load gallery.";
      return;
    }

    container.innerHTML = "";

    for (let file of data) {

      const { data: urlData } = client
        .storage
        .from("wedding-media")
        .getPublicUrl("wedding/" + file.name);

      const url = urlData.publicUrl;

      const div = document.createElement("div");
      div.className = "item";

      const img = document.createElement("img");
      img.src = url;
      img.onclick = () => toggleSelect(img);

      div.appendChild(img);
      container.appendChild(div);
    }
  }

  loadGallery();

  setInterval(loadGallery, 10000);
</script>

</body>
</html>
