<!DOCTYPE html>
<html>
<head>
  <title>Wedding Gallery | Alexander & Jordanne</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff;
      color: #111;
    }

    header {
      text-align: center;
      padding: 40px 20px 10px;
    }

    h1 {
      font-weight: 300;
      font-size: 48px;
      margin: 0;
    }

    .grid {
      column-count: 3;
      column-gap: 12px;
      padding: 20px;
    }

    @media (max-width: 900px) {
      .grid { column-count: 2; }
    }

    @media (max-width: 500px) {
      .grid { column-count: 1; }
    }

    .item {
      position: relative;
      margin-bottom: 12px;
      border-radius: 10px;
      overflow: hidden;
      break-inside: avoid;
    }

    img {
      width: 100%;
      display: block;
      cursor: pointer;
      transition: 0.2s;
    }

    img:hover {
      opacity: 0.9;
    }

    /* ❤️ HEART */
    .heart {
      position: absolute;
      bottom: 10px;
      right: 10px;
      font-size: 22px;
      background: rgba(255,255,255,0.85);
      border-radius: 50%;
      padding: 6px;
      cursor: pointer;
      user-select: none;
    }

    .heart.liked {
      color: red;
    }

    /* LIGHTBOX */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 999;
      touch-action: pan-y;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 80%;
      object-fit: contain;
      transition: transform 0.3s ease;
    }

    .controls {
      position: absolute;
      width: 100%;
      display: flex;
      justify-content: space-between;
      top: 50%;
      transform: translateY(-50%);
      padding: 0 20px;
      color: white;
      font-size: 40px;
      user-select: none;
    }

    .nav {
      cursor: pointer;
      padding: 10px;
    }

    .close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 30px;
      color: white;
      cursor: pointer;
    }

    /* SLIDESHOW MODE */
    .slideshow {
      animation: fade 0.6s ease-in-out;
    }

    @keyframes fade {
      from { opacity: 0.3; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1); }
    }

    .topbar {
      text-align: center;
      margin-top: 10px;
    }

    .btn {
      border: 1px solid black;
      background: white;
      padding: 6px 14px;
      margin: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  <h1>Gallery</h1>
  <p>Alexander & Jordanne • 08.08.26</p>

  <div class="topbar">
    <button class="btn" onclick="startSlideshow()">🎬 Slideshow</button>
    <button class="btn" onclick="stopSlideshow()">⏹ Stop</button>
  </div>
</header>

<div id="gallery" class="grid"></div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <div class="close" onclick="closeLightbox()">✕</div>

  <div class="controls">
    <div class="nav" onclick="prevImage()">‹</div>
    <div class="nav" onclick="nextImage()">›</div>
  </div>

  <img id="lightboxImg" />
</div>

<script>
  const supabaseUrl = "https://abggbnqgbbwtswdecgtz.supabase.co";
  const supabaseKey = "sb_publishable_RHFh1DWp1TbpqmbGYx6x3Q_4uNH7cHh";

  const client = supabase.createClient(supabaseUrl, supabaseKey);

  let images = [];
  let currentIndex = 0;
  let slideshowInterval = null;

  function openLightbox(index) {
    currentIndex = index;
    const lb = document.getElementById("lightbox");
    const img = document.getElementById("lightboxImg");

    lb.style.display = "flex";
    img.src = images[index];
    img.classList.add("slideshow");
  }

  function closeLightbox() {
    document.getElementById("lightbox").style.display = "none";
    stopSlideshow();
  }

  function nextImage() {
    currentIndex = (currentIndex + 1) % images.length;
    updateLightbox();
  }

  function prevImage() {
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    updateLightbox();
  }

  function updateLightbox() {
    const img = document.getElementById("lightboxImg");
    img.classList.remove("slideshow");
    void img.offsetWidth; // restart animation
    img.classList.add("slideshow");
    img.src = images[currentIndex];
  }

  /* ❤️ HEART REACTIONS */
  function toggleHeart(el, id) {
    el.classList.toggle("liked");

    let likes = JSON.parse(localStorage.getItem("weddingLikes") || "{}");
    likes[id] = !likes[id];
    localStorage.setItem("weddingLikes", JSON.stringify(likes));
  }

  /* 🎬 SLIDESHOW */
  function startSlideshow() {
    if (slideshowInterval) return;
    openLightbox(0);
    slideshowInterval = setInterval(nextImage, 3000);
  }

  function stopSlideshow() {
    clearInterval(slideshowInterval);
    slideshowInterval = null;
  }

  /* 👆 SWIPE SUPPORT */
  let touchStartX = 0;

  document.addEventListener("touchstart", e => {
    touchStartX = e.changedTouches[0].screenX;
  });

  document.addEventListener("touchend", e => {
    let diff = e.changedTouches[0].screenX - touchStartX;

    if (Math.abs(diff) > 50) {
      if (diff > 0) prevImage();
      else nextImage();
    }
  });

  async function loadGallery() {
    const container = document.getElementById("gallery");

    const { data } = await client
      .storage
      .from("wedding-media")
      .list("wedding", {
        limit: 100,
        sortBy: { column: "created_at", order: "desc" }
      });

    container.innerHTML = "";
    images = [];

    const likes = JSON.parse(localStorage.getItem("weddingLikes") || "{}");

    data.forEach((file, index) => {

      const { data: urlData } = client
        .storage
        .from("wedding-media")
        .getPublicUrl("wedding/" + file.name);

      const url = urlData.publicUrl;
      images.push(url);

      const div = document.createElement("div");
      div.className = "item";

      const img = document.createElement("img");
      img.src = url;
      img.onclick = () => openLightbox(index);

      const heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = "❤️";

      if (likes[file.name]) heart.classList.add("liked");

      heart.onclick = (e) => {
        e.stopPropagation();
        toggleHeart(heart, file.name);
      };

      div.appendChild(img);
      div.appendChild(heart);

      container.appendChild(div);
    });
  }

  loadGallery();
  setInterval(loadGallery, 10000);
</script>

</body>
</html>
