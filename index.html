<!DOCTYPE html>
<html>
<head>
  <title>Alexander & Jordanne | Wedding Gallery</title>

  <style>
    body {
      margin: 0;
      font-family: "Arial", sans-serif;
      color: white;
      overflow: hidden;
    }

    /* 🌄 Cinematic background */
    .hero {
      height: 100vh;
      width: 100%;
      background-image: url("background.jpg");
      background-size: cover;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
      animation: zoom 25s ease-in-out infinite alternate;
    }

    /* 🌫️ luxury dark + blur overlay */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(4px);
    }

    /* 💎 glass panel */
    .content {
      position: relative;
      z-index: 2;

      padding: 50px 40px;
      border-radius: 20px;

      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);

      backdrop-filter: blur(12px);

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      text-align: center;

      max-width: 650px;

      animation: fadeIn 1.2s ease forwards;
    }

    h1 {
      font-size: 64px;
      font-weight: 300;
      margin: 0;
      letter-spacing: -1px;
      text-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    .date {
      margin-top: 10px;
      letter-spacing: 6px;
      opacity: 0.85;
    }

    .subtitle {
      margin-top: 25px;
      max-width: 500px;
      line-height: 1.6;
      opacity: 0.9;
      font-size: 15px;
    }

    /* 🎯 luxury buttons */
    .buttons {
      margin-top: 35px;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 14px 28px;
      border: 1px solid rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.05);
      color: white;
      cursor: pointer;
      transition: 0.3s ease;
      min-width: 160px;
      font-size: 14px;
      border-radius: 10px;
      backdrop-filter: blur(6px);
    }

    .btn:hover {
      background: white;
      color: black;
      transform: translateY(-2px);
    }

    .footer {
      position: absolute;
      bottom: 20px;
      font-size: 11px;
      opacity: 0.6;
      letter-spacing: 3px;
      z-index: 2;
    }

    /* 🎞️ background motion */
    @keyframes zoom {
      from { transform: scale(1); }
      to { transform: scale(1.06); }
    }

    /* ✨ fade-in */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 📱 mobile tuning */
    @media (max-width: 600px) {
      h1 {
        font-size: 42px;
      }

      .content {
        margin: 20px;
        padding: 30px 20px;
      }
    }
  </style>
</head>

<body>

<div class="hero">

  <div class="overlay"></div>

  <div class="content">

    <h1>Alexander & Jordanne</h1>

    <div class="date">08.08.26</div>

    <div class="subtitle">
      Welcome to our wedding gallery.<br>
      A collection of memories from our special day, shared with love.
    </div>

    <div class="buttons">

      <button class="btn" onclick="window.location.href='gallery.html'">
        View Gallery
      </button>

      <button class="btn" onclick="window.location.href='upload.html'">
        Upload Photos
      </button>

    </div>

  </div>

  <div class="footer">
    THANK YOU FOR CELEBRATING WITH US
  </div>

</div>

</body>
</html>
