<!DOCTYPE html>
<html>
<head>
  <title>Alexander & Jordanne | Wedding Gallery</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff;
      color: #111;
      text-align: center;
    }

    .container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 30px;
    }

    h1 {
      font-size: 56px;
      font-weight: 300;
    }

    .date {
      letter-spacing: 6px;
      margin-top: 10px;
    }

    p {
      color: #666;
      max-width: 420px;
      line-height: 1.5;
      margin-top: 20px;
    }

    input {
      margin-top: 25px;
    }

    button {
      margin-top: 20px;
      padding: 12px 28px;
      border: 1px solid black;
      background: white;
      cursor: pointer;
    }

    button:hover {
      background: black;
      color: white;
    }

    #status {
      margin-top: 15px;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Alexander & Jordanne</h1>
  <div class="date">08.08.26</div>

  <p>
    Share your favourite moments from our wedding day.
    Upload your photos and videos below 🤍
  </p>

  <input type="file" id="fileInput" multiple accept="image/*,video/*" />

  <button onclick="uploadFiles()">Upload Memories</button>

  <div id="status"></div>

</div>

<script>
  const supabaseUrl = "https://abggbnqgbbwtswdecgtz.supabase.co";
  const supabaseKey = "sb_publishable_RHFh1DWp1TbpqmbGYx6x3Q_4uNH7cHh";

  const client = supabase.createClient(supabaseUrl, supabaseKey);

  async function uploadFiles() {
    const files = document.getElementById("fileInput").files;
    const status = document.getElementById("status");

    if (!files.length) {
      status.innerText = "Please select files first.";
      return;
    }

    status.innerText = "Uploading...";

    for (let file of files) {
      const filePath = `wedding/${Date.now()}-${file.name}`;

      const { error } = await client.storage
        .from("wedding-media")
        .upload(filePath, file);

      if (error) {
        console.log(error);
        status.innerText = "Upload failed ❌";
        return;
      }
    }

    status.innerText = "Upload complete ❤️ Thank you!";
    document.getElementById("fileInput").value = "";
  }
</script>

</body>
</html>
