<!DOCTYPE html>
<html>
<head>
  <title>Alexander & Jordanne | Wedding Gallery</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #ffffff;
      color: #111;
      text-align: center;
    }

    .container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 30px;
    }

    h1 {
      font-size: 56px;
      font-weight: 300;
      letter-spacing: -1px;
    }

    .date {
      letter-spacing: 6px;
      margin-top: 10px;
      color: #444;
    }

    p {
      color: #666;
      max-width: 420px;
      line-height: 1.6;
      margin-top: 20px;
    }

    .buttons {
      margin-top: 30px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      padding: 12px 26px;
      border: 1px solid black;
      background: white;
      cursor: pointer;
      font-size: 15px;
      transition: 0.2s;
    }

    button:hover {
      background: black;
      color: white;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Alexander & Jordanne</h1>

  <div class="date">08.08.26</div>

  <p>
    Share your favourite moments from our wedding day.
    Upload your photos and videos so we can relive every memory together 🤍
  </p>

  <div class="buttons">

    <button onclick="window.location.href='gallery.html'">
      View Gallery
    </button>

    <button onclick="window.location.href='upload.html'">
      Upload Memories
    </button>

  </div>

</div>

</body>
</html>
