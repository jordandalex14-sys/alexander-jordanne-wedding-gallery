<!DOCTYPE html>
<html>
<head>
  <title>Alexander & Jordanne | Wedding Gallery</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
    }

    /* 🌄 Background */
    .hero {
      height: 100vh;
      width: 100%;
      background-image: url("background.jpg");
      background-size: cover;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
      animation: zoom 20s ease-in-out infinite alternate;
    }

    /* 🌫️ Overlay */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.4);
    }

    /* Content wrapper */
    .content {
      position: relative;
      z-index: 2;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;

      padding: 20px;
    }

    h1 {
      font-size: 64px;
      font-weight: 300;
      margin: 0;
      text-shadow: 0 2px 20px rgba(0,0,0,0.4);
    }

    .date {
      margin-top: 10px;
      letter-spacing: 6px;
      opacity: 0.85;
    }

    .subtitle {
      margin-top: 25px;
      max-width: 520px;
      line-height: 1.6;
      opacity: 0.9;
    }

    .buttons {
      margin-top: 40px;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 14px 28px;
      border: 1px solid white;
      background: transparent;
      color: white;
      cursor: pointer;
      transition: 0.25s;
      min-width: 160px;
      font-size: 15px;
    }

    .btn:hover {
      background: white;
      color: black;
    }

    .footer {
      position: absolute;
      bottom: 20px;
      font-size: 12px;
      opacity: 0.7;
      letter-spacing: 2px;
      z-index: 2;
    }

    /* 🎞️ slow cinematic zoom */
    @keyframes zoom {
      from { transform: scale(1); }
      to { transform: scale(1.05); }
    }
  </style>
</head>

<body>

<div class="hero">

  <div class="overlay"></div>

  <div class="content">

    <h1>Alexander & Jordanne</h1>

    <div class="date">08.08.26</div>

    <div class="subtitle">
      Welcome to our wedding gallery.<br>
      Share and relive the moments from our special day.
    </div>

    <div class="buttons">

      <button class="btn" onclick="window.location.href='gallery.html'">
        View Gallery
      </button>

      <button class="btn" onclick="window.location.href='upload.html'">
        Upload Photos
      </button>

    </div>

  </div>

  <div class="footer">
    THANK YOU FOR CELEBRATING WITH US
  </div>

</div>

</body>
</html>
